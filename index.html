<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>骨骼掃描 GUI</title>
  <!-- 引入 Handsontable CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
  <!-- 引入 Handsontable JS -->
  <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
  
  <!-- 載入候選資料檔案 (這些檔案需定義全域變數，如 window.radioactivitiesCandidates) -->
  <script src="radioactivities.js"></script>
  <script src="lesions.js"></script>
  <script src="appendices.js"></script>
  <script src="lesionCanonicalizer.js"></script>
  <script src="previousReportParser.js"></script>
  <script src="changes.js"></script>
  <script src="impressions.js"></script>
  
  <!-- 載入封裝 fuzzy search、highlight 與 dropdown 強化功能的外部 JS -->
  <script src="autocompleteEnhance.js"></script>
  
  <!-- 載入報告生成器 -->
  <script src="reportGenerator.js"></script>

  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #ffffff;
      --panel-muted: #fbfbfb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #1f2937;
      --accent-soft: #eef2f7;
      --danger: #ef4444;
      --success: #111827;
      --radius: 8px;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: var(--font-sans);
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--bg);
      color: var(--text);
    }
    .workspace-shell {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      flex: 1 1 auto;
    }
    .topbar {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, max-content) minmax(0, max-content) 1fr minmax(0, max-content);
      gap: 8px;
      align-items: center;
      min-width: 0;
    }
    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .toolbar-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .toolbar-spacer {
      flex: 1 1 auto;
    }
    .compact-input {
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-sizing: border-box;
      background: var(--panel);
      color: var(--text);
      font: 500 12px/1 var(--font-sans);
      outline: none;
      box-shadow: none;
    }
    .compact-input:focus,
    .previous-report-bar textarea:focus,
    .report-item textarea:focus {
      border-color: var(--border-strong);
    }
    .date-input {
      width: 150px;
    }
    .api-input {
      width: 150px;
    }
    .action-group {
      justify-content: flex-end;
    }
    .column-menu-wrapper {
      position: relative;
      display: inline-flex;
    }
    .column-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 236px;
      max-height: min(420px, calc(100vh - 120px));
      overflow: auto;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.14);
      z-index: 900;
    }
    .column-menu[hidden] {
      display: none;
    }
    .column-menu-header {
      padding: 2px 4px 8px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .column-menu-options {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .column-menu-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 3px 4px;
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.25;
      cursor: pointer;
    }
    .column-menu-option:hover {
      background: var(--accent-soft);
    }
    .column-menu-option input {
      margin: 0;
      flex: 0 0 auto;
    }
    .column-menu-actions {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding-top: 8px;
      margin-top: 8px;
      border-top: 1px solid var(--border);
    }
    .column-menu-actions .copy-btn {
      border-radius: var(--radius);
      flex: 1 1 auto;
    }
    .previous-report-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 168px;
      gap: 8px;
      align-items: stretch;
      min-width: 0;
    }
    .previous-report-bar textarea {
      min-height: 68px;
      max-height: 88px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      resize: vertical;
      box-sizing: border-box;
      background: var(--panel);
      color: var(--text);
    }
    .previous-report-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      min-width: 0;
    }
    .parser-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .parser-tabs {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-muted);
      width: fit-content;
      max-width: 100%;
    }
    .parser-tab {
      border: 0;
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      padding: 4px 10px;
      font: 600 11px/1 var(--font-sans);
      cursor: pointer;
      white-space: nowrap;
    }
    .parser-tab.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .parser-status {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .helper-text {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .main-container {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) 8px minmax(0, 0.92fr);
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
    }
    .pane-resizer {
      position: relative;
      align-self: stretch;
      min-width: 8px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: col-resize;
      touch-action: none;
      padding: 0;
    }
    .pane-resizer::before {
      content: "";
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: 3px;
      width: 2px;
      border-radius: 999px;
      background: var(--border-strong);
      opacity: 0.65;
      transition: opacity 0.15s ease, background-color 0.15s ease;
    }
    .pane-resizer:hover::before,
    .pane-resizer:focus-visible::before,
    body.pane-resizing .pane-resizer::before {
      background: var(--accent);
      opacity: 0.9;
    }
    .pane-resizer:focus-visible {
      outline: 2px solid var(--border-strong);
      outline-offset: 2px;
    }
    body.pane-resizing {
      cursor: col-resize;
      user-select: none;
    }
    .table-container {
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    #hot {
      width: 100%;
      height: 100%;
      min-height: 420px;
      overflow: auto;
    }
    .highlight {
      background-color: #e5e7eb;
    }
    .myCustomDropdown td {
      white-space: normal !important;
      word-wrap: break-word !important;
      overflow-wrap: break-word !important;
      max-width: 600px;
    }
    .handsontable td.candidate-warning-cell {
      color: var(--danger) !important;
      box-shadow: inset 0 0 0 1px rgba(239, 68, 68, 0.25);
      background: #fff;
    }
    .handsontable td.candidate-warning-cell.current,
    .handsontable td.candidate-warning-cell.area,
    .handsontable td.candidate-warning-cell.highlight {
      color: var(--danger) !important;
    }
    .btn {
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      font-family: var(--font-sans);
      font-weight: 500;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .btn:hover {
      background: var(--accent-soft);
      border-color: var(--border-strong);
    }
    .btn-warning {
      color: var(--danger);
      border-color: rgba(239, 68, 68, 0.25);
      background: #fff;
    }
    .btn-warning:hover {
      background: #fef2f2;
      border-color: rgba(239, 68, 68, 0.35);
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #374151;
      border-color: #374151;
      color: #fff;
    }
    .btn-subtle {
      background: var(--panel-muted);
    }
    #notification {
      position: fixed;
      bottom: 12px;
      right: 12px;
      padding: 8px 14px;
      background-color: var(--accent);
      color: white;
      border-radius: var(--radius);
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
      box-shadow: var(--shadow);
    }
    #notification.show {
      opacity: 1;
    }
    #notification.error {
      background-color: var(--danger);
    }
    .report-container {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      box-shadow: var(--shadow);
    }
    #reportSection {
      padding: 0;
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .report-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }
    .report-item h4 {
      margin: 0;
      color: var(--text);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .report-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .report-item textarea {
      width: 100%;
      min-height: 0;
      flex: 1 1 auto;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      resize: vertical;
      background: var(--panel-muted);
      box-sizing: border-box;
      line-height: 1.5;
      color: var(--text);
    }
    .copy-btn {
      height: 28px;
      padding: 0 8px;
      background: var(--panel);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .copy-btn:hover {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--border-strong);
    }
    .copy-btn.copied {
      background: #eef2f7;
      color: var(--text);
      border-color: var(--border-strong);
    }
    #textFindings {
      min-height: 230px;
    }
    #textFindingsSeparated,
    #textImpressions {
      min-height: 170px;
    }
    .handsontable,
    .handsontable .htCore,
    .handsontable td,
    .handsontable th {
      font-family: var(--font-sans) !important;
      font-size: 12px !important;
    }
    .handsontable .htCore td,
    .handsontable .htCore th,
    .handsontable td,
    .handsontable th {
      background: #fff !important;
      color: var(--text) !important;
      border-color: #eef0f2 !important;
    }
    .handsontable th,
    .handsontable .ht_clone_top th,
    .handsontable .ht_clone_left th {
      background: #f8fafc !important;
      color: var(--text-muted) !important;
      font-weight: 600 !important;
    }
    .handsontable th.candidate-sort-header {
      cursor: pointer;
    }
    .handsontable th.candidate-sort-header-active {
      color: var(--text) !important;
    }
    .handsontable .currentRow,
    .handsontable .currentCol,
    .handsontable .area {
      background: #f8fafc !important;
    }
    .handsontable .ht_master .wtHolder,
    .handsontable .wtHolder {
      background: #fff !important;
    }
    .handsontable .wtBorder {
      background-color: #cbd5e1 !important;
    }
    .handsontable .htDimmed {
      color: #374151 !important;
    }
    @media (max-width: 1380px) {
      .toolbar {
        grid-template-columns: minmax(0, max-content) minmax(0, max-content) 1fr;
      }
      .action-group {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }
    @media (max-width: 1100px) {
      .main-container {
        grid-template-columns: 1fr;
      }
      .pane-resizer {
        display: none;
      }
      .toolbar {
        grid-template-columns: 1fr;
        align-items: stretch;
      }
      .toolbar-group {
        justify-content: flex-start;
      }
      #hot {
        min-height: 320px;
      }
      .previous-report-bar {
        grid-template-columns: 1fr;
      }
      .previous-report-actions {
        align-items: flex-start;
      }
    }
    @media (max-width: 760px) {
      body {
        padding: 10px;
      }
      .toolbar-group,
      .action-group {
        gap: 5px;
      }
      .compact-input,
      .btn {
        width: 100%;
      }
      .date-input,
      .api-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="workspace-shell">
    <div class="topbar">
      <div class="toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">前次日期</span>
          <input type="date" id="examDate" class="compact-input date-input" />
          <button id="generateReportBtn" class="btn btn-primary">生成</button>
          <button id="sendReportDataBtn" class="btn btn-primary">Send report data</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">API Key</span>
          <input type="password" id="openaiApiKey" class="compact-input api-input" placeholder="OpenAI API key" />
          <button id="saveApiKeyBtn" class="btn">儲存</button>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-group action-group">
          <button id="saveBtn" class="btn">儲存</button>
          <button id="loadBtn" class="btn">載入</button>
          <button id="exportBtn" class="btn">CSV</button>
          <div class="column-menu-wrapper" id="columnMenuWrapper">
            <button id="columnsMenuBtn" class="btn" type="button" aria-expanded="false" aria-controls="columnsMenu">Columns</button>
            <div id="columnsMenu" class="column-menu" hidden>
              <div class="column-menu-header">Columns</div>
              <div id="columnsMenuOptions" class="column-menu-options"></div>
              <div class="column-menu-actions">
                <button id="showAllColumnsBtn" class="copy-btn" type="button">Show all</button>
                <button id="resetColumnsBtn" class="copy-btn" type="button">Reset</button>
              </div>
            </div>
          </div>
          <button id="loadTestDataBtn" class="btn btn-subtle">測試</button>
          <button id="clearBtn" class="btn btn-warning">清除</button>
        </div>
      </div>

      <div class="previous-report-bar">
        <textarea id="previousReportInput" placeholder="貼上先前報告全文。系統會優先使用 API 解析，失敗時自動改用 rule-based 備援。"></textarea>
        <div class="previous-report-actions">
          <div class="parser-controls">
            <div class="parser-tabs" role="tablist" aria-label="解析模式">
              <button type="button" id="parserTabApi" class="parser-tab active" data-mode="api">API</button>
              <button type="button" id="parserTabRuleBased" class="parser-tab" data-mode="rule-based">Rule-based</button>
            </div>
            <div id="parserStatus" class="parser-status">目前模式：API</div>
          </div>
          <button id="loadPreviousReportBtn" class="btn btn-primary">解析載入</button>
          <div id="parserHint" class="helper-text">API 優先，失敗時自動切換到 Rule-based。</div>
        </div>
      </div>
    </div>

    <div class="main-container">
      <div class="table-container">
        <div id="hot"></div>
      </div>
      <button id="paneResizer" class="pane-resizer" type="button" aria-label="調整表格與報告寬度" aria-orientation="vertical" title="拖曳調整表格與報告寬度"></button>
      <div class="report-container">
        <div id="reportSection" style="display: none;">
          <div class="report-item">
            <h4>
              <span>Findings</span>
              <div class="report-actions">
                <button class="copy-btn" onclick="copyToClipboard('textFindings', this)">複製</button>
              </div>
            </h4>
            <textarea id="textFindings" readonly></textarea>
          </div>
          <div class="report-item">
            <h4>
              <span>Findings Separated</span>
              <div class="report-actions">
                <button class="copy-btn" onclick="copyToClipboard('textFindingsSeparated', this)">複製</button>
              </div>
            </h4>
            <textarea id="textFindingsSeparated" readonly></textarea>
          </div>
          <div class="report-item">
            <h4>
              <span>Impressions</span>
              <div class="report-actions">
                <button class="copy-btn" onclick="copyToClipboard('textImpressions', this)">複製</button>
                <button class="copy-btn" onclick="copyNegativeImpression(this)">複製 Negative</button>
              </div>
            </h4>
            <textarea id="textImpressions" readonly></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 通知元素 -->
  <div id="notification"></div>

  <script>
    // 從 autocompleteEnhance.js 取得所需函式
    const { candidateSourceFactory, plainTextRenderer, enhanceAutocompleteDropdown, clearCaches } = window.autocompleteEnhance;
    
    // 啟用 AutocompleteEditor 增強功能（包含 fuzzy search、highlight、換行）
    enhanceAutocompleteDropdown();

    function normalizeCandidateValue(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function isAppendixLesionValue(value) {
      if (window.reportGenerator?.isAppendixLesionValue) {
        return window.reportGenerator.isAppendixLesionValue(value);
      }
      const normalized = normalizeCandidateValue(value).toLowerCase();
      const appendices = window.appendicesCandidates || [];
      return /\bmay\s+indicate\b/i.test(normalized) ||
        appendices.some(candidate => normalizeCandidateValue(candidate).toLowerCase() === normalized);
    }

    function getCandidateItems(candidates) {
      if (Array.isArray(candidates)) {
        return candidates;
      }
      if (candidates && typeof candidates === 'object') {
        return Object.keys(candidates);
      }
      return [];
    }

    function createCandidateLookup(candidates) {
      return new Set(getCandidateItems(candidates).map(normalizeCandidateValue));
    }

    function getColumnCandidateData(config, candidateData) {
      if (config.title !== 'Lesions') {
        return candidateData;
      }
      return [
        ...getCandidateItems(candidateData),
        ...getCandidateItems(window.appendicesCandidates || [])
      ];
    }

    function createCandidateAwareRenderer(candidateLookup, { allowAppendix = false } = {}) {
      return function candidateAwareRenderer(instance, td, row, col, prop, value, cellProperties) {
        plainTextRenderer(instance, td, row, col, prop, value, cellProperties);

        const normalizedValue = normalizeCandidateValue(value);
        const isAllowedAppendix = allowAppendix && isAppendixLesionValue(normalizedValue);
        const isWarning = normalizedValue !== '' && !candidateLookup.has(normalizedValue) && !isAllowedAppendix;
        td.classList.toggle('candidate-warning-cell', isWarning);
        if (isWarning) {
          td.style.setProperty('color', 'var(--danger)', 'important');
          td.title = 'Not in preset candidates';
        } else {
          td.style.removeProperty('color');
          td.removeAttribute('title');
        }

        return td;
      };
    }
    
    // 定義 autocomplete 欄位的預設設定（適用於所有 autocomplete 欄位）
    const defaultAutocompleteConfig = {
      type: 'autocomplete',
      strict: false,    // 預設不限制只能選候選項
      filter: false,    // 關閉 Handsontable 內建 filter（使用自訂 fuzzy search）
      renderer: plainTextRenderer  // 選定後只顯示純文字，不保留高亮效果
    };

    // 通知函數 - 取代 alert
    function showNotification(message, isError = false) {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.className = isError ? 'show error' : 'show';
      
      // 2秒後自動消失
      setTimeout(() => {
        notification.className = '';
      }, 2000);
    }

    /**
     * configMyColumns
     * rawConfigs 陣列的每一個物件，若有 src 屬性，則會根據檔案名稱自動抓取候選資料。
     */
    function configMyColumns(rawConfigs) {
      return rawConfigs.map(config => {
        if (config.src) {
          // 假設 "radioactivities.js" 對應的全域變數為 "radioactivitiesCandidates"
          const candidateVarName = config.src.replace('.js', '') + 'Candidates';
          const candidateData = window[candidateVarName];
          if (!candidateData) {
            console.error(`找不到候選資料：${candidateVarName}`);
          }
          const columnCandidateData = getColumnCandidateData(config, candidateData);
          const candidateLookup = createCandidateLookup(columnCandidateData);
          return {
            ...defaultAutocompleteConfig,
            title: config.title,
            source: candidateSourceFactory(columnCandidateData, { sortByLength: config.sortByLength === true }),
            renderer: createCandidateAwareRenderer(candidateLookup, { allowAppendix: config.title === 'Lesions' }),
            proportion: config.proportion || 1,
            ...config.overrides
          };
        } else {
          // 非 autocomplete 欄位直接回傳
          return config;
        }
      });
    }
    
    // 原始欄位設定，只需指定 src（例如 "radioactivities.js"）或直接指定 type
    const rawColumnConfigs = [
      { key: 'radioactivities',     title: 'Radioactivities',      src: 'radioactivities.js', proportion: 1 },
      { key: 'lesions',             title: 'Lesions',              src: 'lesions.js',         proportion: 1, sortByLength: true },
      { key: 'changes',             title: 'Changes',              src: 'changes.js',         proportion: 1, sortByLength: true },
      { key: 'impressions',         title: 'Impressions',          src: 'impressions.js',     proportion: 3, sortByLength: true },
      { key: 'previousImpression',  title: 'Previous Impression',  type: 'text',             proportion: 1.8 },
      { key: 'note',                title: 'Note',                 type: 'text',             proportion: 1.5 },
      { key: 's',                   title: 'S',                    type: 'text',             proportion: 0.2 },
      { key: 'i',                   title: 'I',                    type: 'text',             proportion: 0.2 },
      { key: 'x',                   title: 'X',                    type: 'text',             proportion: 0.2 },
      { key: 'y',                   title: 'Y',                    type: 'text',             proportion: 0.2 }
    ];
    
    // 透過 configMyColumns 處理後，得到完整的欄位設定
    const myColumns = configMyColumns(rawColumnConfigs);
    const COLUMN_INDEX = {
      RADIOACTIVITIES: 0,
      LESIONS: 1,
      CHANGES: 2,
      IMPRESSIONS: 3,
      PREVIOUS_IMPRESSION: 4,
      NOTE: 5,
      S: 6,
      I: 7,
      X: 8,
      Y: 9
    };
    const BONE_SCAN_PROCEDURE = 'A bone scan consisting of whole body and/or spot views is obtained by gamma camera with low energy high resolution collimator 3 hours after the intravenous injection of 20 mCi of Tc-99m MDP.';
    const PARSER_MODE = {
      API: 'api',
      RULE_BASED: 'rule-based'
    };
    const DEFAULT_ROW_COUNT = 30;
    function decodeTransferData(encodedData) {
      try {
        return decodeURIComponent(escape(atob(encodedData)));
      } catch (error) {
        return atob(encodedData);
      }
    }

    function readExtensionData() {
      const encodedData = new URLSearchParams(window.location.search).get('data');
      if (!encodedData) return null;

      try {
        const data = JSON.parse(decodeTransferData(encodedData));
        return data && data.type === 'GUI_EXTENSION_DATA' ? data : null;
      } catch (error) {
        console.warn('無法解析 extension data:', error);
        return null;
      }
    }

    const guiExtensionData = readExtensionData();
    window.guiExtensionData = guiExtensionData;
    window.clinicalHistoryContext = getAreaValue(guiExtensionData, 'ClinicalHistory');

    function getAreaValue(data, key) {
      const areaValue = data?.areas?.[key];
      if (areaValue && typeof areaValue === 'object' && Object.prototype.hasOwnProperty.call(areaValue, 'value')) {
        return areaValue.value || '';
      }
      if (typeof areaValue === 'string') {
        return areaValue;
      }
      return data?.textValues?.[key] || '';
    }

    function getExtensionReferno() {
      return String(guiExtensionData?.patientInfo?.referno || '').trim();
    }

    function getScopedStorageKey(key) {
      const referno = getExtensionReferno();
      return referno ? `boneReportGenerator:${referno}:${key}` : `boneReportGenerator:standalone:${key}`;
    }

    function getCachedGeneratorState() {
      return guiExtensionData?.cache?.generatorState || {};
    }
    
    // 取得欄位標題
    const baseColHeaders = myColumns.map(col => col.title);
    const columnKeys = myColumns.map((col, index) => col.key || baseColHeaders[index] || String(index));
    const TABLE_DATA_SCHEMA_VERSION = 2;
    const COLUMN_VISIBILITY_STORAGE_KEY = 'boneReportGenerator:columnVisibility';
    const MAIN_PANE_RATIO_STORAGE_KEY = 'boneReportGenerator:mainPaneRatio';
    const INCOMPATIBLE_TABLE_DATA_MESSAGE = '舊版暫存資料已略過，請重新解析或重新載入';
    const DEFAULT_HIDDEN_COLUMN_KEYS = new Set(['previousImpression']);
    const DEFAULT_MAIN_PANE_RATIO = 0.54;
    const MIN_MAIN_PANE_RATIO = 0.35;
    const MAX_MAIN_PANE_RATIO = 0.75;
    const STACKED_LAYOUT_MEDIA_QUERY = '(max-width: 1100px)';
    let storedHiddenColumnKeys = loadStoredHiddenColumnKeys();
    let currentMainPaneRatio = loadMainPaneRatio();
    let paneResizeActive = false;
    let paneLayoutFrame = null;
    const transientVisibleColumnKeys = new Set();
    let appliedHiddenColumnKeys = new Set(getActiveHiddenColumnKeys());
    const SORTABLE_COLUMN_INDEXES = new Set([
      COLUMN_INDEX.RADIOACTIVITIES,
      COLUMN_INDEX.LESIONS,
      COLUMN_INDEX.CHANGES,
      COLUMN_INDEX.IMPRESSIONS
    ]);
    const candidateSortState = {
      columnIndex: null,
      direction: 'asc'
    };
    const colHeaders = index => getColumnHeader(index);
    const container = document.getElementById('hot');
    const minColumnWidths = [120, 138, 106, 240, 180, 120, 38, 38, 38, 38];
    const DEFAULT_RADIOACTIVITY = 'increased radioactivity in {}';
    const AUTOFILL_DEFAULT_RADIOACTIVITY_SOURCE = 'autofillDefaultRadioactivity';
    const APPENDIX_RADIOACTIVITY_CLEAR_SOURCE = 'appendixRadioactivityClear';
    const radioactivityCandidateLookup = new Map(
      (window.radioactivitiesCandidates || []).map(candidate => [
        String(candidate || '').replace(/\s+/g, ' ').trim().toLowerCase(),
        candidate
      ])
    );
    const radioactivityTemplatePrefixes = (window.radioactivitiesCandidates || []).map(candidate => {
      const prefix = String(candidate || '').replace('{}', '').replace(/\s+/g, ' ').trim();
      return {
        candidate,
        prefix,
        normalizedPrefix: prefix.toLowerCase()
      };
    }).sort((a, b) => b.prefix.length - a.prefix.length);
    const candidateSortOrderMaps = new Map([
      [COLUMN_INDEX.RADIOACTIVITIES, buildCandidateSortOrderMap(window.radioactivitiesCandidates || [])],
      [COLUMN_INDEX.LESIONS, buildCandidateSortOrderMap([
        ...getCandidateItems(window.lesionsCandidates || []),
        ...getCandidateItems(window.appendicesCandidates || [])
      ])],
      [COLUMN_INDEX.CHANGES, buildCandidateSortOrderMap(Object.keys(window.changesCandidates || {}))],
      [COLUMN_INDEX.IMPRESSIONS, buildCandidateSortOrderMap(window.impressionsCandidates || [])]
    ]);
    let selectedParserMode = PARSER_MODE.API;
    let resolvedParserMode = PARSER_MODE.API;

    function sanitizeColumnKeys(keys) {
      const validKeys = new Set(columnKeys);
      return new Set(
        Array.from(keys || [])
          .map(key => String(key || '').trim())
          .filter(key => validKeys.has(key))
      );
    }

    function columnKeyToIndex(key) {
      return columnKeys.indexOf(key);
    }

    function columnIndexToKey(index) {
      return columnKeys[index] || '';
    }

    function loadStoredHiddenColumnKeys() {
      try {
        const saved = localStorage.getItem(COLUMN_VISIBILITY_STORAGE_KEY);
        if (!saved) {
          return new Set(DEFAULT_HIDDEN_COLUMN_KEYS);
        }

        const parsed = JSON.parse(saved);
        const savedKeys = Array.isArray(parsed)
          ? parsed
          : Array.isArray(parsed?.hiddenColumnKeys)
            ? parsed.hiddenColumnKeys
            : Array.isArray(parsed?.hiddenColumns)
              ? parsed.hiddenColumns.map(index => columnIndexToKey(Number(index)))
              : null;

        return savedKeys ? sanitizeColumnKeys(savedKeys) : new Set(DEFAULT_HIDDEN_COLUMN_KEYS);
      } catch (error) {
        console.warn('欄位顯示設定載入失敗:', error);
        return new Set(DEFAULT_HIDDEN_COLUMN_KEYS);
      }
    }

    function persistColumnVisibility() {
      try {
        localStorage.setItem(COLUMN_VISIBILITY_STORAGE_KEY, JSON.stringify({
          hiddenColumnKeys: Array.from(storedHiddenColumnKeys)
        }));
      } catch (error) {
        console.warn('欄位顯示設定儲存失敗:', error);
      }
    }

    function getActiveHiddenColumnKeys() {
      return new Set(
        Array.from(storedHiddenColumnKeys)
          .filter(key => !transientVisibleColumnKeys.has(key))
      );
    }

    function getActiveHiddenColumnIndexes() {
      return Array.from(getActiveHiddenColumnKeys())
        .map(columnKeyToIndex)
        .filter(index => index >= 0)
        .sort((a, b) => a - b);
    }

    function isColumnVisible(columnIndex) {
      return !getActiveHiddenColumnKeys().has(columnIndexToKey(columnIndex));
    }

    function renderColumnMenuOptions() {
      const optionsContainer = document.getElementById('columnsMenuOptions');
      if (!optionsContainer) return;

      optionsContainer.replaceChildren();
      baseColHeaders.forEach((header, index) => {
        const key = columnIndexToKey(index);
        const label = document.createElement('label');
        const checkbox = document.createElement('input');
        const text = document.createElement('span');

        label.className = 'column-menu-option';
        checkbox.type = 'checkbox';
        checkbox.checked = isColumnVisible(index);
        checkbox.addEventListener('change', () => {
          setColumnHidden(key, !checkbox.checked, { persist: true });
        });
        text.textContent = header;

        label.appendChild(checkbox);
        label.appendChild(text);
        optionsContainer.appendChild(label);
      });
    }

    function columnKeysToIndexes(keys) {
      return Array.from(keys || [])
        .map(columnKeyToIndex)
        .filter(index => index >= 0)
        .sort((a, b) => a - b);
    }

    function syncHiddenColumnsPlugin(nextHiddenColumnKeys) {
      if (typeof hot === 'undefined' || !hot) return;

      const hiddenColumnsPlugin = hot.getPlugin?.('hiddenColumns');
      if (!hiddenColumnsPlugin) return;

      const nextHiddenKeys = sanitizeColumnKeys(nextHiddenColumnKeys);
      const columnsToShow = columnKeysToIndexes(
        Array.from(appliedHiddenColumnKeys).filter(key => !nextHiddenKeys.has(key))
      );
      const columnsToHide = columnKeysToIndexes(
        Array.from(nextHiddenKeys).filter(key => !appliedHiddenColumnKeys.has(key))
      );

      if (columnsToShow.length > 0 && typeof hiddenColumnsPlugin.showColumns === 'function') {
        hiddenColumnsPlugin.showColumns(columnsToShow);
      }
      if (columnsToHide.length > 0 && typeof hiddenColumnsPlugin.hideColumns === 'function') {
        hiddenColumnsPlugin.hideColumns(columnsToHide);
      }
      appliedHiddenColumnKeys = nextHiddenKeys;
    }

    function applyColumnVisibility({ persist = false, notify = '' } = {}) {
      if (persist) {
        persistColumnVisibility();
      }

      if (typeof hot !== 'undefined' && hot) {
        const hiddenColumnKeys = getActiveHiddenColumnKeys();
        const hiddenColumnIndexes = columnKeysToIndexes(hiddenColumnKeys);
        hot.updateSettings({
          hiddenColumns: {
            columns: hiddenColumnIndexes,
            indicators: true
          },
          colWidths: index => calculateColWidth(index)
        });
        syncHiddenColumnsPlugin(hiddenColumnKeys);
        hot.render();
      }

      renderColumnMenuOptions();
      if (notify) {
        showNotification(notify);
      }
    }

    function setColumnHidden(key, hidden, { persist = true } = {}) {
      const columnKey = String(key || '');
      if (!columnKeys.includes(columnKey)) return;

      transientVisibleColumnKeys.delete(columnKey);
      if (hidden) {
        storedHiddenColumnKeys.add(columnKey);
      } else {
        storedHiddenColumnKeys.delete(columnKey);
      }
      applyColumnVisibility({ persist });
    }

    function showAllColumns() {
      storedHiddenColumnKeys = new Set();
      transientVisibleColumnKeys.clear();
      applyColumnVisibility({ persist: true, notify: '所有欄位已顯示' });
    }

    function resetColumnVisibility() {
      storedHiddenColumnKeys = new Set(DEFAULT_HIDDEN_COLUMN_KEYS);
      transientVisibleColumnKeys.clear();
      applyColumnVisibility({ persist: true, notify: '欄位顯示已重設' });
    }

    function autoShowColumns(keys) {
      sanitizeColumnKeys(keys).forEach(key => {
        transientVisibleColumnKeys.add(key);
      });
      applyColumnVisibility({ persist: false });
    }

    function toggleColumnMenu(forceOpen = null) {
      const menu = document.getElementById('columnsMenu');
      const button = document.getElementById('columnsMenuBtn');
      if (!menu || !button) return;

      const shouldOpen = forceOpen === null ? menu.hidden : Boolean(forceOpen);
      menu.hidden = !shouldOpen;
      button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
      if (shouldOpen) {
        renderColumnMenuOptions();
      }
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function loadMainPaneRatio() {
      const savedRatio = Number(localStorage.getItem(MAIN_PANE_RATIO_STORAGE_KEY));
      return Number.isFinite(savedRatio)
        ? clampNumber(savedRatio, MIN_MAIN_PANE_RATIO, MAX_MAIN_PANE_RATIO)
        : DEFAULT_MAIN_PANE_RATIO;
    }

    function isStackedPaneLayout() {
      return window.matchMedia(STACKED_LAYOUT_MEDIA_QUERY).matches;
    }

    function scheduleHotLayoutRefresh() {
      if (paneLayoutFrame !== null) return;
      paneLayoutFrame = window.requestAnimationFrame(() => {
        paneLayoutFrame = null;
        if (typeof hot === 'undefined' || !hot) return;
        hot.updateSettings({
          colWidths: index => calculateColWidth(index)
        });
        hot.render();
      });
    }

    function applyMainPaneRatio() {
      const mainContainer = document.querySelector('.main-container');
      if (!mainContainer) return;

      if (isStackedPaneLayout()) {
        mainContainer.style.gridTemplateColumns = '';
        return;
      }

      const tableRatio = clampNumber(currentMainPaneRatio, MIN_MAIN_PANE_RATIO, MAX_MAIN_PANE_RATIO);
      mainContainer.style.gridTemplateColumns = `minmax(0, ${tableRatio}fr) 8px minmax(0, ${1 - tableRatio}fr)`;
      scheduleHotLayoutRefresh();
    }

    function setMainPaneRatio(ratio, { persist = false } = {}) {
      currentMainPaneRatio = clampNumber(Number(ratio), MIN_MAIN_PANE_RATIO, MAX_MAIN_PANE_RATIO);
      if (persist) {
        try {
          localStorage.setItem(MAIN_PANE_RATIO_STORAGE_KEY, String(currentMainPaneRatio));
        } catch (error) {
          console.warn('Pane ratio 儲存失敗:', error);
        }
      }
      applyMainPaneRatio();
    }

    function updateMainPaneRatioFromPointer(event, { persist = false } = {}) {
      const mainContainer = document.querySelector('.main-container');
      if (!mainContainer || isStackedPaneLayout()) return;

      const rect = mainContainer.getBoundingClientRect();
      if (rect.width <= 0) return;

      setMainPaneRatio((event.clientX - rect.left) / rect.width, { persist });
    }

    function startPaneResize(event) {
      if ((event.button ?? 0) !== 0 || isStackedPaneLayout()) return;

      paneResizeActive = true;
      document.body.classList.add('pane-resizing');
      event.currentTarget.setPointerCapture?.(event.pointerId);
      updateMainPaneRatioFromPointer(event);
      event.preventDefault();
    }

    function movePaneResize(event) {
      if (!paneResizeActive) return;
      updateMainPaneRatioFromPointer(event);
      event.preventDefault();
    }

    function finishPaneResize(event) {
      if (!paneResizeActive) return;

      paneResizeActive = false;
      document.body.classList.remove('pane-resizing');
      updateMainPaneRatioFromPointer(event, { persist: true });
    }

    function handlePaneResizerKeydown(event) {
      if (isStackedPaneLayout()) return;
      const step = event.shiftKey ? 0.06 : 0.03;

      if (event.key === 'ArrowLeft') {
        setMainPaneRatio(currentMainPaneRatio - step, { persist: true });
        event.preventDefault();
      } else if (event.key === 'ArrowRight') {
        setMainPaneRatio(currentMainPaneRatio + step, { persist: true });
        event.preventDefault();
      }
    }

    function createBlankTableData() {
      return Array.from({ length: DEFAULT_ROW_COUNT }, () => Array(myColumns.length).fill(''));
    }

    function normalizeCurrentTableRow(row) {
      if (!Array.isArray(row)) {
        throw new Error('暫存資料格式不正確');
      }

      const normalized = Array(myColumns.length).fill('');
      for (let index = 0; index < Math.min(row.length, myColumns.length); index += 1) {
        normalized[index] = row[index] ?? '';
      }
      return normalized;
    }

    function normalizeCurrentTableRows(rows) {
      if (!Array.isArray(rows)) {
        throw new Error('暫存資料格式不正確');
      }
      return rows.map(normalizeCurrentTableRow);
    }

    function assertCurrentTableSchemaVersion(schemaVersion) {
      if (Number(schemaVersion) !== TABLE_DATA_SCHEMA_VERSION) {
        throw new Error(INCOMPATIBLE_TABLE_DATA_MESSAGE);
      }
    }

    function parseCurrentTablePayload(payload) {
      if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
        throw new Error(INCOMPATIBLE_TABLE_DATA_MESSAGE);
      }

      assertCurrentTableSchemaVersion(payload.schemaVersion);
      return normalizeCurrentTableRows(payload.rows);
    }

    function parseCurrentGeneratorStateTableData(generatorState) {
      assertCurrentTableSchemaVersion(generatorState?.tableDataSchemaVersion);
      return normalizeCurrentTableRows(generatorState?.tableData);
    }

    function serializeTableData(rows) {
      return {
        schemaVersion: TABLE_DATA_SCHEMA_VERSION,
        rows: normalizeCurrentTableRows(rows)
      };
    }

    function persistTableData(rows) {
      localStorage.setItem(getScopedStorageKey('tableData'), JSON.stringify(serializeTableData(rows)));
    }

    function normalizeSortValue(value) {
      return normalizeCandidateValue(value).toLowerCase().replace(/\.$/, '');
    }

    function buildCandidateSortOrderMap(candidates) {
      const orderMap = new Map();
      getCandidateItems(candidates).forEach((candidate, index) => {
        const key = normalizeSortValue(candidate);
        if (key && !orderMap.has(key)) {
          orderMap.set(key, index);
        }
      });
      return orderMap;
    }

    function isSortableColumn(columnIndex) {
      return SORTABLE_COLUMN_INDEXES.has(columnIndex);
    }

    function getColumnHeader(index) {
      const header = baseColHeaders[index] || '';
      if (candidateSortState.columnIndex !== index) {
        return header;
      }
      return `${header} ${candidateSortState.direction === 'asc' ? '↑' : '↓'}`;
    }

    function isBlankRow(row) {
      return (row || []).every(cell => normalizeCandidateValue(cell) === '');
    }

    function getCandidateSortInfo(row, columnIndex, orderMap) {
      const normalizedValue = normalizeSortValue(row?.[columnIndex]);
      const isKnownCandidate = normalizedValue !== '' && orderMap.has(normalizedValue);

      return {
        isKnownCandidate,
        rank: isKnownCandidate ? orderMap.get(normalizedValue) : Number.POSITIVE_INFINITY
      };
    }

    function sortRowsByCandidateOrder(rows, columnIndex, direction) {
      const orderMap = candidateSortOrderMaps.get(columnIndex) || new Map();
      const directionMultiplier = direction === 'desc' ? -1 : 1;

      return rows
        .map((row, index) => {
          const blank = isBlankRow(row);
          const sortInfo = blank
            ? { isKnownCandidate: false, rank: Number.POSITIVE_INFINITY }
            : getCandidateSortInfo(row, columnIndex, orderMap);

          return {
            row,
            index,
            blank,
            ...sortInfo
          };
        })
        .sort((a, b) => {
          if (a.blank !== b.blank) {
            return a.blank ? 1 : -1;
          }
          if (a.isKnownCandidate !== b.isKnownCandidate) {
            return a.isKnownCandidate ? -1 : 1;
          }
          if (a.isKnownCandidate && b.isKnownCandidate && a.rank !== b.rank) {
            return (a.rank - b.rank) * directionMultiplier;
          }
          return a.index - b.index;
        })
        .map(item => item.row);
    }

    function persistSortedTableData(sortedData) {
      persistTableData(sortedData);
      refreshReport({ silent: true });
      scheduleDraftSave();
    }

    function applyCandidateOrderSort(columnIndex) {
      if (!isSortableColumn(columnIndex)) {
        return;
      }

      const nextDirection = candidateSortState.columnIndex === columnIndex && candidateSortState.direction === 'asc'
        ? 'desc'
        : 'asc';

      candidateSortState.columnIndex = columnIndex;
      candidateSortState.direction = nextDirection;

      const sortedData = sortRowsByCandidateOrder(hot.getData(), columnIndex, nextDirection);
      hot.loadData(sortedData);
      persistSortedTableData(sortedData);
      hot.render();
      showNotification(`${baseColHeaders[columnIndex]} 已${nextDirection === 'asc' ? '正向' : '反向'}排序`);
    }

    // 動態計算欄寬：依據容器寬度與各欄比例
    function calculateColWidth(index) {
      const totalWidth = Math.max(container.clientWidth, 920);
      const totalProportion = myColumns.reduce((sum, col) => sum + (col.proportion || 1), 0);
      const unit = totalWidth / totalProportion;
      const proportionalWidth = (myColumns[index].proportion || 1) * unit;
      return Math.max(minColumnWidths[index] || 80, Math.round(proportionalWidth));
    }

    function shouldAutofillDefaultRadioactivity(oldValue, newValue) {
      return (String(oldValue || '').trim() === '' || isAppendixLesionValue(oldValue)) &&
        String(newValue || '').trim() !== '' &&
        !isAppendixLesionValue(newValue);
    }

    function isDefaultAutofilledRadioactivity(value) {
      return normalizeCandidateValue(value) === DEFAULT_RADIOACTIVITY;
    }

    // 嘗試從本地儲存載入資料
    function getInitialData() {
      try {
        const cachedGeneratorState = getCachedGeneratorState();
        if (Object.prototype.hasOwnProperty.call(cachedGeneratorState, 'tableData')) {
          return parseCurrentGeneratorStateTableData(cachedGeneratorState);
        }

        const savedData = localStorage.getItem(getScopedStorageKey('tableData'));
        if (savedData) {
          return parseCurrentTablePayload(JSON.parse(savedData));
        }
      } catch (e) {
        console.error('載入儲存資料失敗', e);
        showNotification(INCOMPATIBLE_TABLE_DATA_MESSAGE, true);
      }
      return createBlankTableData();
    }

    // 儲存資料到本地 - 使用無提示或自動消失提示
    function saveData() {
      try {
        const data = hot.getData();
        persistTableData(data);
        postDraftToOpener();
        showNotification('資料已儲存');
      } catch (e) {
        console.error('儲存資料失敗', e);
        showNotification('儲存資料失敗：' + e.message, true);
      }
    }

    // 載入已儲存資料
    function loadData() {
      try {
        const savedData = localStorage.getItem(getScopedStorageKey('tableData'));
        if (savedData) {
          hot.loadData(parseCurrentTablePayload(JSON.parse(savedData)));
          refreshReport({ silent: true });
          scheduleDraftSave();
          showNotification('資料已載入');
        } else {
          showNotification('沒有已儲存的資料', true);
        }
      } catch (e) {
        console.error('載入資料失敗', e);
        showNotification('載入資料失敗：' + e.message, true);
      }
    }

    function clearPreviousReportContext() {
      const examDateInput = document.getElementById('examDate');
      const previousReportInput = document.getElementById('previousReportInput');

      if (examDateInput) {
        examDateInput.value = '';
      }
      if (previousReportInput) {
        previousReportInput.value = '';
      }
      localStorage.removeItem(getScopedStorageKey('savedDate'));
    }

    // 清除所有資料
    function clearData() {
      if (confirm('確定要清除所有資料嗎？此操作無法復原！')) {
        hot.loadData(createBlankTableData());
        localStorage.removeItem(getScopedStorageKey('tableData'));
        clearPreviousReportContext();
        refreshReport({ silent: true });
        scheduleDraftSave();
        showNotification('所有資料已清除');
      }
    }

    // 匯出為 CSV
    function exportToCsv() {
      try {
        const data = hot.getData();
        const headers = baseColHeaders.join(',');
        const rows = data.map(row => row.map(cell => {
          // 處理特殊字符，確保 CSV 格式正確
          const cellStr = String(cell || '');
          if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
            return `"${cellStr.replace(/"/g, '""')}"`;
          }
          return cellStr;
        }).join(','));
        
        const csvContent = [headers, ...rows].join('\n');
        
        // 創建下載連結

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', `骨骼掃描_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showNotification('CSV 檔案已下載');

    function normalizeReportInput(reportText) {
      return window.previousReportParser?.normalizeReportInput
        ? window.previousReportParser.normalizeReportInput(reportText)
        : String(reportText || '').trim();
    }

    function normalizeDate(dateString) {
      if (!dateString || typeof dateString !== 'string') return '';
      const match = dateString.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
      if (!match) return '';
      const [, year, month, day] = match;
      return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
    }

    function normalizeLesionValue(lesion) {
      return String(lesion || '')
        .replace(/\s+/g, ' ')
        .replace(/\s+([,.;:])/g, '$1')
        .trim();
    }

    function normalizeNoteValue(note) {
      return String(note || '')
        .replace(/\r\n?/g, '\n')
        .replace(/[ \t]+\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function resolveExactRadioactivityCandidate(value) {
      const normalizedValue = String(value || '').replace(/\s+/g, ' ').trim().toLowerCase();
      return radioactivityCandidateLookup.get(normalizedValue) || '';
    }

    function splitEmbeddedRadioactivity(record) {
      let lesion = normalizeLesionValue(record.lesion);
      let radioactivity = resolveExactRadioactivityCandidate(record.radioactivity);

      if (radioactivity || !lesion) {
        return { lesion, radioactivity };
      }

      const normalizedLesion = lesion.toLowerCase();
      for (const template of radioactivityTemplatePrefixes) {
        if (!template.normalizedPrefix) continue;
        if (normalizedLesion === template.normalizedPrefix) {
          return { lesion: '', radioactivity: template.candidate };
        }
        if (normalizedLesion.startsWith(`${template.normalizedPrefix} `)) {
          return {
            lesion: normalizeLesionValue(lesion.slice(template.prefix.length).trim()),
            radioactivity: template.candidate
          };
        }
      }

      return { lesion, radioactivity: '' };
    }

    function normalizeParsedRecord(record) {
      const baseRecord = (record && typeof record === 'object') ? record : {};
      const splitRecord = splitEmbeddedRadioactivity({
        lesion: baseRecord.lesion || baseRecord.location || '',
        radioactivity: baseRecord.radioactivity || '',
      });

      return {
        lesion: splitRecord.lesion,
        radioactivity: splitRecord.radioactivity,
        previousImpression: normalizeNoteValue(
          baseRecord.previousImpression ||
          baseRecord.priorImpression ||
          baseRecord.note ||
          baseRecord.impression ||
          baseRecord.comment ||
          ''
        )
      };
    }

    function getLesionCandidateSortRank(lesion) {
      if (window.lesionCanonicalizer?.getCandidateRank) {
        return window.lesionCanonicalizer.getCandidateRank(lesion);
      }

      const normalizedLesion = String(lesion || '').replace(/\s+/g, ' ').trim().toLowerCase();
      const candidateIndex = (window.lesionsCandidates || [])
        .findIndex(candidate => String(candidate || '').replace(/\s+/g, ' ').trim().toLowerCase() === normalizedLesion);

      return candidateIndex >= 0 ? candidateIndex : Number.POSITIVE_INFINITY;
    }

    function getFallbackLesionSortRank(lesion) {
      const rankRules = [
        { pattern: /skull|frontal|parietal|temporal|occipital|maxilla|mandible|mastoid|paranasal/i, rank: 10 },
        { pattern: /^(?:upper |middle |lower )?c-?spine|^[c]\d/i, rank: 20 },
        { pattern: /^(?:upper |middle |lower )?t-?spine|^[t]\d/i, rank: 30 },
        { pattern: /stern|rib|cost/i, rank: 40 },
        { pattern: /^(?:lower )?l-?spine|^[l]\d/i, rank: 50 },
        { pattern: /sacroiliac|si joint|pelvis|pelvic|sacrum|ilium|iliac|ischium|ischia|pubis|pubes|acetabul/i, rank: 60 },
        { pattern: /clavicle|scapula|shoulder|humer|elbow|radius|ulna|wrist|hand/i, rank: 70 },
        { pattern: /hip|femur|femora|knee|tibia|fibula|ankle|foot|calcane/i, rank: 80 }
      ];

      return rankRules.find(rule => rule.pattern.test(lesion))?.rank ?? 999;
    }

    function sortPreviousReportRecords(records) {
      return records
        .map((record, index) => ({
          record,
          index,
          candidateRank: getLesionCandidateSortRank(record.lesion),
          fallbackRank: getFallbackLesionSortRank(record.lesion)
        }))
        .sort((a, b) => {
          if (a.candidateRank !== b.candidateRank) return a.candidateRank - b.candidateRank;
          if (a.fallbackRank !== b.fallbackRank) return a.fallbackRank - b.fallbackRank;
          return a.index - b.index;
        })
        .map(item => item.record);
    }

    function canonicalizePreviousReportRecords(records) {
      const canonicalizer = window.lesionCanonicalizer;
      const flattenedRecords = [];

      records.forEach(record => {
        const normalizedRecord = normalizeParsedRecord(record);
        const canonicalizedRecords = canonicalizer?.canonicalizeRecord
          ? canonicalizer.canonicalizeRecord(normalizedRecord)
          : [normalizedRecord];

        canonicalizedRecords.forEach(canonicalizedRecord => {
          const normalizedCanonicalRecord = normalizeParsedRecord(canonicalizedRecord);
          if (normalizedCanonicalRecord.lesion) {
            flattenedRecords.push(normalizedCanonicalRecord);
          }
        });
      });

      const deduplicated = [];
      const seen = new Set();
      flattenedRecords.forEach(record => {
        const key = record.lesion.replace(/\s+/g, ' ').trim().toLowerCase();
        if (seen.has(key)) return;
        seen.add(key);
        deduplicated.push(record);
      });

      return sortPreviousReportRecords(deduplicated);
    }

    function setParserMode(mode, statusText = '') {
      selectedParserMode = mode;
      resolvedParserMode = mode;

      const isApi = mode === PARSER_MODE.API;
      document.getElementById('parserTabApi').classList.toggle('active', isApi);
      document.getElementById('parserTabRuleBased').classList.toggle('active', !isApi);
      document.getElementById('parserStatus').textContent = statusText || (isApi ? '目前模式：API' : '目前模式：Rule-based');
      document.getElementById('parserHint').textContent = isApi
        ? 'API 優先，失敗時自動切換到 Rule-based。'
        : '僅使用本地 Rule-based 解析。';
    }

    function validateParsedPreviousReport(parsed) {
      if (!parsed || typeof parsed !== 'object') {
        throw new Error('解析結果格式不正確');
      }

      const examDate = normalizeDate(parsed.examDate || '');
      let records = [];

      if (Array.isArray(parsed.records)) {
        records = canonicalizePreviousReportRecords(parsed.records);
      } else if (Array.isArray(parsed.lesions)) {
        records = canonicalizePreviousReportRecords(
          parsed.lesions.map(lesion => ({
            lesion: normalizeLesionValue(lesion),
            radioactivity: '',
            previousImpression: ''
          }))
        );
      }

      if (records.length === 0) {
        throw new Error('找不到可載入的病灶');
      }

      return {
        records,
        examDate
      };
    }

    function createEmptyRow() {
      return Array(myColumns.length).fill('');
    }

    function populateTableFromPreviousReport(parsedResult) {
      const normalized = validateParsedPreviousReport(parsedResult);
      const rowCount = Math.max(DEFAULT_ROW_COUNT, normalized.records.length);
      const newData = Array.from({ length: rowCount }, () => createEmptyRow());
      const autofillUpdates = [];

      normalized.records.forEach((record, index) => {
        newData[index][COLUMN_INDEX.RADIOACTIVITIES] = record.radioactivity || '';
        newData[index][COLUMN_INDEX.LESIONS] = record.lesion;
        newData[index][COLUMN_INDEX.PREVIOUS_IMPRESSION] = record.previousImpression || '';
        if (!record.radioactivity && record.lesion && !isAppendixLesionValue(record.lesion)) {
          autofillUpdates.push([index, COLUMN_INDEX.RADIOACTIVITIES, DEFAULT_RADIOACTIVITY]);
        }
      });

      hot.loadData(newData);
      if (autofillUpdates.length > 0) {
        hot.setDataAtCell(autofillUpdates, AUTOFILL_DEFAULT_RADIOACTIVITY_SOURCE);
      }
      persistTableData(hot.getData());

      document.getElementById('examDate').value = normalized.examDate || '';
      saveDate(false);
      scheduleDraftSave();
      const autoShowKeys = ['changes'];
      if (normalized.records.some(record => String(record.previousImpression || '').trim() !== '')) {
        autoShowKeys.push('previousImpression');
      }
      autoShowColumns(autoShowKeys);
      return normalized;
    }

    function parsePreviousReportRuleBased(reportText) {
      if (!window.previousReportParser?.parseRuleBased) {
        throw new Error('Rule-based parser is unavailable');
      }
      return window.previousReportParser.parseRuleBased(reportText);

    async function callOpenAIForPreviousReport(reportText, apiKey) {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          temperature: 0,
          max_tokens: 1200,
          response_format: { type: 'json_object' },
          messages: [
            {
              role: 'system',
              content: `Extract structured data from a prior bone scan report and return a JSON object only, with this exact shape: {"examDate":"YYYY-MM-DD or empty string","records":[{"lesion":"string","radioactivity":"string","previousImpression":"string"}]}. Each record must represent one lesion. "lesion" is required. "radioactivity" should be one exact string from this allowed list when highly confident, otherwise "":
${JSON.stringify(window.radioactivitiesCandidates || [])}
"previousImpression" should be a concise prior impression/comment summary specifically relevant to that lesion; if not clear, use "". Prefer concise canonical app wording when obvious, such as "C-spine" rather than "cervical spine", "left SI joint" rather than "left SI junction", "right sternoclavicular joint" rather than "right sterno-clavicular junction", and "bilateral maxilla" rather than "bilateral maxillae". Still extract meaningful lesions even if the wording is not in the app vocabulary. Keep records organized roughly from head to toe.`
            },
            {
              role: 'user',
              content: normalizeReportInput(reportText)
            }
          ]
        })
      });

      if (!response.ok) {
        throw new Error(`OpenAI API error (${response.status})`);
      }

      const payload = await response.json();
      const content = payload?.choices?.[0]?.message?.content;
      if (!content) {
        throw new Error('OpenAI API 未回傳可解析內容');
      }

      return validateParsedPreviousReport(JSON.parse(content));
    }

    async function loadPreviousReport() {
      const reportText = document.getElementById('previousReportInput').value.trim();
      if (!reportText) {
        showNotification('請先貼上先前報告內容', true);
        return;
      }

      const apiKey = document.getElementById('openaiApiKey').value.trim();
      let parsedResult;

      if (selectedParserMode === PARSER_MODE.RULE_BASED) {
        try {
          parsedResult = validateParsedPreviousReport(parsePreviousReportRuleBased(reportText));
          setParserMode(PARSER_MODE.RULE_BASED, '本次使用 Rule-based');
        } catch (error) {
          console.error('Rule-based parsing failed:', error);
          showNotification(`先前報告解析失敗：${error.message}`, true);
          return;
        }
      } else {
        try {
          if (!apiKey) {
            throw new Error('No API key');
          }
          parsedResult = await callOpenAIForPreviousReport(reportText, apiKey);
          setParserMode(PARSER_MODE.API, '本次使用 API');
        } catch (apiError) {
          console.warn('API parsing failed, fallback to rule-based parser.', apiError);
          try {
            parsedResult = validateParsedPreviousReport(parsePreviousReportRuleBased(reportText));
            setParserMode(
              PARSER_MODE.RULE_BASED,
              apiKey ? 'API 失敗，已切換至 Rule-based' : '未提供 API Key，已切換至 Rule-based'
            );
          } catch (fallbackError) {
            console.error('Rule-based parsing failed:', fallbackError);
            showNotification(`先前報告解析失敗：${fallbackError.message}`, true);
            return;
          }
        }
      }

      const normalized = populateTableFromPreviousReport(parsedResult);
      refreshReport({ silent: true });
      showNotification(`${resolvedParserMode === PARSER_MODE.API ? 'API' : 'Rule-based'} 已載入 ${normalized.records.length} 筆病灶`);
    }

    function generateKeyword(tableData) {
      return (tableData || [])
        .map(row => {
          const lesion = normalizeLesionValue(row?.[COLUMN_INDEX.LESIONS]);
          const noteValue = String(row?.[COLUMN_INDEX.NOTE] || '').trim();
          const sValue = String(row?.[COLUMN_INDEX.S] || '').trim();
          const iValue = String(row?.[COLUMN_INDEX.I] || '').trim();
          const xValue = String(row?.[COLUMN_INDEX.X] || '').trim();
          const yValue = String(row?.[COLUMN_INDEX.Y] || '').trim();
          const keywordValues = [
            noteValue ? `N: ${noteValue}` : '',
            sValue ? `S: ${sValue}` : '',
            iValue ? `I: ${iValue}` : '',
            xValue ? `X: ${xValue}` : '',
            yValue ? `Y: ${yValue}` : ''
          ].filter(Boolean).join(' ');
          const lesionLabel = lesion || (noteValue ? '#' : '');

          return lesionLabel && keywordValues ? `${lesionLabel} → ${keywordValues}` : '';
        })
        .filter(Boolean)
        .join('\n');
    }

    function mergeKeywordValues(existingKeyword, generatedKeyword) {
      const existingText = String(existingKeyword || '');
      const existingLineKeys = new Set(
        existingText
          .split(/\r?\n/)
          .map(line => line.trim())
          .filter(Boolean)
      );
      const missingGeneratedLines = String(generatedKeyword || '')
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(line => {
          if (!line || existingLineKeys.has(line)) {
            return false;
          }
          existingLineKeys.add(line);
          return true;
        });

      if (missingGeneratedLines.length === 0) {
        return existingText;
      }
      if (!existingText) {
        return missingGeneratedLines.join('\n');
      }
      return `${existingText}${existingText.endsWith('\n') ? '' : '\n'}${missingGeneratedLines.join('\n')}`;
    }

    // 初始化 Handsontable
    const hot = new Handsontable(container, {
      data: getInitialData(),
      columns: myColumns,
      colHeaders,
      rowHeaders: true,
      manualColumnResize: true,
      manualRowMove: true,
      colWidths: index => calculateColWidth(index),
      stretchH: 'none',
      hiddenColumns: {
        columns: getActiveHiddenColumnIndexes(),
        indicators: true
      },
      licenseKey: 'non-commercial-and-evaluation',
      afterGetColHeader: function(column, TH) {
        const sortable = isSortableColumn(column);
        TH.classList.toggle('candidate-sort-header', sortable);
        TH.classList.toggle('candidate-sort-header-active', candidateSortState.columnIndex === column);
        if (sortable) {
          TH.title = '依候選清單順序排序';
          TH.setAttribute('aria-sort', candidateSortState.columnIndex === column
            ? (candidateSortState.direction === 'asc' ? 'ascending' : 'descending')
            : 'none');
        } else {
          TH.removeAttribute('aria-sort');
          TH.removeAttribute('title');
        }
      },
      afterOnCellMouseDown: function(event, coords) {
        const target = event?.target;
        const isColumnResizeHandle = Boolean(target?.closest?.('.manualColumnResizer'));
        if ((event?.button ?? 0) !== 0 || isColumnResizeHandle || !coords || coords.row >= 0 || !isSortableColumn(coords.col)) {
          return;
        }
        applyCandidateOrderSort(coords.col);
      },
      // 自動儲存功能 - 當編輯完成時觸發
      afterChange: function(changes, source) {
        if (changes &&
            source !== 'loadData' &&
            source !== AUTOFILL_DEFAULT_RADIOACTIVITY_SOURCE &&
            source !== APPENDIX_RADIOACTIVITY_CLEAR_SOURCE) {
          const radioactivityUpdates = [];
          changes.forEach(([row, prop, oldValue, newValue]) => {
            if (prop !== COLUMN_INDEX.LESIONS) {
              return;
            }
            const currentRadioactivity = hot.getDataAtCell(row, COLUMN_INDEX.RADIOACTIVITIES);
            if (isAppendixLesionValue(newValue)) {
              if (isDefaultAutofilledRadioactivity(currentRadioactivity)) {
                radioactivityUpdates.push([row, COLUMN_INDEX.RADIOACTIVITIES, '']);
              }
              return;
            }
            if (!shouldAutofillDefaultRadioactivity(oldValue, newValue)) {
              return;
            }
            if (String(currentRadioactivity || '').trim() !== '') {
              return;
            }
            radioactivityUpdates.push([row, COLUMN_INDEX.RADIOACTIVITIES, DEFAULT_RADIOACTIVITY]);
          });

          if (radioactivityUpdates.length > 0) {
            const updateSource = radioactivityUpdates.some(([, , value]) => value === '')
              ? APPENDIX_RADIOACTIVITY_CLEAR_SOURCE
              : AUTOFILL_DEFAULT_RADIOACTIVITY_SOURCE;
            hot.setDataAtCell(radioactivityUpdates, updateSource);
          }
        }

        if (source !== 'loadData') {
          // 只有用戶編輯時才自動儲存，但不顯示通知
          try {
            const data = hot.getData();
            persistTableData(data);
            scheduleRefreshReport();
            scheduleDraftSave();
            // 編輯時不顯示通知，避免干擾
          } catch (e) {
            console.error('自動儲存失敗', e);
            // 只有失敗時才顯示通知
            showNotification('自動儲存失敗：' + e.message, true);
          }
        }
      }
    });

    function copyTextValue(text, triggerBtn = null) {
      
      if (!text || text.trim() === '') {
        showNotification('沒有內容可以複製', true);
        return;
      }
      
      // 使用現代的 Clipboard API
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          showCopySuccess(triggerBtn);
        }).catch(err => {
          // 如果 Clipboard API 失敗，使用舊方法
          fallbackCopyTextToClipboard(text, triggerBtn);
        });
      } else {
        // 不支援 Clipboard API，使用舊方法
        fallbackCopyTextToClipboard(text, triggerBtn);
      }
    }

    // 舊版瀏覽器的複製方法
    function fallbackCopyTextToClipboard(text, triggerBtn = null) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.left = "-999999px";
      textArea.style.top = "-999999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          showCopySuccess(triggerBtn);
        } else {
          showNotification('複製失敗', true);
        }
      } catch (err) {
        showNotification('複製功能不支援', true);
      }
      
      document.body.removeChild(textArea);
    }

    // 顯示複製成功效果
    function showCopySuccess(copyBtn) {
      if (!copyBtn) {
        showNotification('已複製到剪貼板');
        return;
      }
      const originalText = copyBtn.textContent;
      
      copyBtn.textContent = '已複製';
      copyBtn.classList.add('copied');
      
      showNotification('已複製到剪貼板');
      
      setTimeout(() => {
        copyBtn.textContent = originalText;
        copyBtn.classList.remove('copied');
      }, 1500);
    }

    // 生成報告函數
    function generateReport() {
      saveDate(true);
      refreshReport();
    }

    function closeReportWindowAfterSend() {
      window.setTimeout(() => {
        try {
          window.close();
        } catch (error) {
          console.warn('Unable to close report window automatically:', error);
        }

        window.setTimeout(() => {
          if (!window.closed) {
            showNotification('Report data sent. You may close this tab.');
          }
        }, 500);
      }, 0);
    }

    function sendReportData() {
      const examDate = document.getElementById('examDate').value.trim();
      const tableData = hot.getData();

      try {
        const report = window.reportGenerator.getReport(tableData, examDate);
        const areas = buildReportAreas(report, tableData);
        const reportData = {
          type: 'GUI_REPORT_RESULT',
          areas,
          generatorState: getGeneratorState(),
          Procedure: BONE_SCAN_PROCEDURE,
          Findings: areas.Findings.value,
          Impression: areas.Impression.value,
          Keyword: areas.Keyword.value
        };

        document.getElementById('textFindings').value = reportData.Findings;
        document.getElementById('textFindingsSeparated').value = report.textFindingsSeparated || '';
        document.getElementById('textImpressions').value = reportData.Impression;
        latestTextImpressionsNegative = report.textImpressionsNegative || '';
        document.getElementById('reportSection').style.display = 'flex';

        if (window.opener) {
          window.opener.postMessage(reportData, '*');
          showNotification('Report data sent');
          console.log('Report data sent:', reportData);
          closeReportWindowAfterSend();
        } else {
          showNotification('No opener found, unable to send data', true);
          console.error('No opener found, unable to send data', reportData);
        }
      } catch (error) {
        console.error('送出報告資料時發生錯誤:', error);
        showNotification('送出報告資料時發生錯誤: ' + error.message, true);
      }
    }

    // 初始化時載入儲存的日期
    renderColumnMenuOptions();
    loadSavedDate();
    loadSavedApiKey();
    setParserMode(PARSER_MODE.API);
    refreshReport({ silent: true });
    if (guiExtensionData?.cache) {
      showNotification('已載入此 referno 的 5 天內快取');
    }

    // 綁定按鈕事件
    document.getElementById('saveBtn').addEventListener('click', saveData);
    document.getElementById('loadBtn').addEventListener('click', loadData);
    document.getElementById('exportBtn').addEventListener('click', exportToCsv);
    document.getElementById('clearBtn').addEventListener('click', clearData);
    document.getElementById('columnsMenuBtn').addEventListener('click', event => {
      event.stopPropagation();
      toggleColumnMenu();
    });
    document.getElementById('columnsMenu').addEventListener('click', event => {
      event.stopPropagation();
    });
    document.getElementById('showAllColumnsBtn').addEventListener('click', showAllColumns);
    document.getElementById('resetColumnsBtn').addEventListener('click', resetColumnVisibility);
    document.getElementById('paneResizer').addEventListener('pointerdown', startPaneResize);
    document.getElementById('paneResizer').addEventListener('keydown', handlePaneResizerKeydown);
    document.addEventListener('pointermove', movePaneResize);
    document.addEventListener('pointerup', finishPaneResize);
    document.addEventListener('pointercancel', finishPaneResize);
    document.getElementById('loadTestDataBtn').addEventListener('click', loadTestData);
    document.getElementById('generateReportBtn').addEventListener('click', generateReport);
    document.getElementById('sendReportDataBtn').addEventListener('click', sendReportData);
    document.getElementById('saveApiKeyBtn').addEventListener('click', () => saveApiKey(true));
    document.getElementById('loadPreviousReportBtn').addEventListener('click', loadPreviousReport);
    document.getElementById('parserTabApi').addEventListener('click', () => setParserMode(PARSER_MODE.API));
    document.getElementById('parserTabRuleBased').addEventListener('click', () => setParserMode(PARSER_MODE.RULE_BASED));
    
    // 日期變更時自動儲存（不顯示提示）
    document.getElementById('examDate').addEventListener('change', () => {
      saveDate(false);
      scheduleRefreshReport();
    });
    document.getElementById('openaiApiKey').addEventListener('change', () => saveApiKey(false));
    document.addEventListener('click', event => {
      const wrapper = document.getElementById('columnMenuWrapper');
      if (wrapper && !wrapper.contains(event.target)) {
        toggleColumnMenu(false);
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        toggleColumnMenu(false);
      }
    });
  </script>
</body>
</html>
